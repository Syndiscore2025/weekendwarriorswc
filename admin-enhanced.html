<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enhanced Admin Dashboard - Weekend Warriors WC</title>
  <link rel="stylesheet" href="style.css?v=20251104-3" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* Clean Professional Admin Styles */
    body {
      background: #1a1a1a !important;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }

    .admin-wrap {
      max-width: 98%;
      margin: 0 auto;
      padding: 1.5rem;
    }

    /* Tab Navigation Styles */
    .tab-navigation {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 2rem;
      background: #242424;
      padding: 1rem;
      border-radius: 8px;
      border: 1px solid #333;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      max-width: 100%;
    }

    .tab-btn {
      padding: 0.75rem 1.5rem;
      background: #333;
      border: 1px solid #444;
      color: #e0e0e0;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s ease;
      white-space: nowrap;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .tab-btn:hover {
      background: #3a3a3a;
      border-color: #e60000;
      color: #fff;
    }

    .tab-btn.active {
      background: #e60000;
      border-color: #e60000;
      color: #fff;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(230,0,0,0.4);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .content-card {
      background: #242424 !important;
      border: 1px solid #333 !important;
      border-radius: 8px !important;
      padding: 1.5rem !important;
      margin: 1.5rem 0 !important;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3) !important;
    }

    .content-card h2 {
      color: #fff !important;
      font-size: 1.3rem !important;
      margin-bottom: 1rem !important;
      font-weight: 600 !important;
      border-bottom: 2px solid #e60000;
      padding-bottom: 0.5rem;
    }

    .content-card h3 {
      color: #4db8ff !important;
      font-size: 1.1rem !important;
      margin: 1.5rem 0 1rem 0 !important;
      font-weight: 600 !important;
    }

    .muted { color: #aaa; font-size: .95rem; }
    .note { font-size: .9rem; color: #bbb; margin-bottom: 1rem; }
    .stack { display: grid; gap: 1rem; }
    .row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: .75rem; align-items: center; }

    /* Button Styles */
    button {
      transition: all 0.2s ease;
    }

    button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .danger {
      background: #dc3545;
      border: none;
      color: #fff;
      padding: 0.6rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .success {
      background: #28a745;
      border: none;
      color: #fff;
      padding: 0.6rem 1.2rem;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .primary {
      background: #4db8ff;
      border: none;
      color: #fff;
      padding: 0.6rem 1.2rem;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .secondary {
      background: #6c757d;
      border: none;
      color: #fff;
      padding: 0.6rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .small-btn {
      padding: 0.5rem 0.9rem;
      border-radius: 6px;
      border: none;
      background: #e60000;
      color: #fff;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
    }

    input, select, textarea {
      width: 100%;
      padding: .7rem;
      border: 1px solid #444;
      background: #2a2a2a;
      color: #fff;
      border-radius: 4px;
      font-size: .9rem;
      box-sizing: border-box;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #e60000;
      background: #333;
    }

    .hidden { display: none; }


    /* Mobile Responsive Styles */
    @media (max-width: 768px) {
      .admin-wrap {
        padding: 1rem;
      }

      .tab-navigation {
        padding: 0.75rem;
        gap: 0.4rem;
      }

      .tab-btn {
        padding: 0.75rem 1rem;
        font-size: 0.85rem;
        min-height: 44px;
      }

      .content-card {
        padding: 1rem !important;
      }

      .content-card h2 {
        font-size: 1.1rem !important;
      }

      .content-card h3 {
        font-size: 1rem !important;
      }

      .row {
        grid-template-columns: 1fr !important;
        gap: 0.5rem;
      }

      input, select, textarea {
        font-size: 16px !important;
        padding: 0.75rem;
      }

      button {
        width: 100%;
        padding: 0.875rem 1rem !important;
        font-size: 0.95rem !important;
      }

      table.admin-list {
        font-size: 0.85rem;
      }

      table.admin-list th,
      table.admin-list td {
        padding: 0.6rem 0.5rem;
      }
    }

    @media (max-width: 480px) {
      .tab-btn {
        flex: 1 1 calc(50% - 0.4rem);
        min-width: calc(50% - 0.4rem);
      }
    }

    .topbar {
      display:flex;
      justify-content: space-between;
      align-items:center;
      gap: 1rem;
      padding: 1rem 1.5rem;
      background: #242424;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      border: 1px solid #333;
    }

    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }

    /* Table Styles */
    .table-container {
      overflow-x: auto;
      margin-top: 1rem;
      border: 1px solid #333;
      border-radius: 4px;
      background: #2a2a2a;
    }

    table.admin-list {
      border-collapse: collapse;
      width: 100%;
      min-width: 800px;
      background: #2a2a2a;
    }

    table.admin-list th {
      background: #1a1a1a;
      padding: .9rem .8rem;
      text-align: left;
      font-weight: 600;
      white-space: nowrap;
      color: #fff;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 2px solid #e60000;
    }

    table.admin-list td {
      text-align: left;
      padding: .8rem;
      border-bottom: 1px solid #333;
      color: #ddd;
      font-size: 0.9rem;
      vertical-align: middle;
    }

    table.admin-list tr:last-child td {
      border-bottom: none;
    }

    /* Toggle Switch */
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 60px;
      height: 30px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #6c757d;
      transition: .4s;
      border-radius: 30px;
    }

    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 22px;
      width: 22px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .toggle-slider {
      background-color: #28a745;
    }

    input:checked + .toggle-slider:before {
      transform: translateX(30px);
    }

    /* Print Styles for Tournament Day Roster */
    @media print {
      body * {
        visibility: hidden;
      }

      #tournament-print-area,
      #tournament-print-area * {
        visibility: visible;
      }

      #tournament-print-area {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
      }

      .no-print {
        display: none !important;
      }

      .tournament-wrestler-card {
        page-break-inside: avoid;
        border: 2px solid #000 !important;
        background: #fff !important;
        color: #000 !important;
      }

      input[type="text"],
      input[type="number"] {
        border: 1px solid #000 !important;
        background: #fff !important;
      }
    }
  </style>
</head>
<body>
  <header>
    <img src="IMG_6531.png" alt="Weekend Warriors Wrestling Club Logo" class="logo">
    <h1>Weekend Warriors Wrestling Club</h1>
    <p>Admin Dashboard</p>
  </header>
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="schedule.html">Schedule</a>
    <a href="contact.html">Contact</a>
    <a href="winter-signups.html" class="winter-nav">
      <span style="font-size: 0.7rem; font-weight: 600; letter-spacing: 0.5px;">25-26 WINTER SEASON</span>
      <span style="font-size: 0.85rem; font-weight: 700; letter-spacing: 0.5px;">SIGN-UPS</span>
    </a>
    <button id="sign-out" class="small-btn nav-signout" style="display: none; background: #e60000; color: #fff; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-weight: 600;">Sign out</button>
  </nav>

  <section class="admin-wrap">
    <!-- Authentication Section -->
    <div class="content-card">
      <h2>Sign in</h2>
      <p class="note">Enter the admin password to access the dashboard.</p>

      <div id="auth-view" class="stack">
        <input id="password" type="password" placeholder="Password" required />
        <button id="sign-in" class="small-btn">Sign in</button>
        <div id="auth-error" class="muted" style="color: #ff5252;"></div>
      </div>

    </div>

    <!-- Main Dashboard (Hidden until authenticated) -->
    <div id="dash" class="hidden">
      <!-- Tab Navigation -->
      <div class="tab-navigation">
        <button class="tab-btn active" data-tab="website">Website</button>
        <button class="tab-btn" data-tab="registrations">Registrations</button>
        <button class="tab-btn" data-tab="team">Team Roster</button>
        <button class="tab-btn" data-tab="tournament">Tournament Day</button>
        <button class="tab-btn" data-tab="attendance">Attendance</button>
        <button class="tab-btn" data-tab="weight">Weight Tracking</button>
        <button class="tab-btn" data-tab="results">Results</button>
        <button class="tab-btn" data-tab="payments">Payments</button>
        <button class="tab-btn" data-tab="communication">Communication</button>
        <button class="tab-btn" data-tab="practice">Practice Plans</button>
        <button class="tab-btn" data-tab="photos">Photos</button>
        <button class="tab-btn" data-tab="equipment">Equipment</button>
        <button class="tab-btn" data-tab="volunteers">Volunteers</button>
        <button class="tab-btn" data-tab="medical">Medical</button>
        <button class="tab-btn" data-tab="skills">Skills</button>
        <button class="tab-btn" data-tab="settings">Settings</button>
      </div>

      <!-- Tab Content Containers -->
      <div id="tab-website" class="tab-content active"></div>
      <div id="tab-registrations" class="tab-content"></div>
      <div id="tab-team" class="tab-content"></div>
      <div id="tab-tournament" class="tab-content"></div>
      <div id="tab-attendance" class="tab-content"></div>
      <div id="tab-weight" class="tab-content"></div>
      <div id="tab-results" class="tab-content"></div>
      <div id="tab-payments" class="tab-content"></div>
      <div id="tab-communication" class="tab-content"></div>
      <div id="tab-practice" class="tab-content"></div>
      <div id="tab-photos" class="tab-content"></div>
      <div id="tab-equipment" class="tab-content"></div>
      <div id="tab-volunteers" class="tab-content"></div>
      <div id="tab-medical" class="tab-content"></div>
      <div id="tab-skills" class="tab-content"></div>
      <div id="tab-settings" class="tab-content"></div>
    </div>
  </section>

  <footer>
    <div class="powered-by-syndiscore">
      Powered by <a href="https://syndiscore.ai" target="_blank" rel="noopener noreferrer">syndiscore.ai</a>
    </div>
  </footer>

  <script src="admin-enhanced.js"></script>
</body>
</html>
